name: ci

on:
  push:
    branches:
      - main
      - rust-rewrite
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.10.0'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build Rust backend
        working-directory: backend
        run: cargo build --release

      - name: Package release bundle
        run: ./build.sh -r

      - name: Collect release bundle
        run: |
          rm -rf release-out
          mkdir -p release-out
          cp -R ../../artifacts/YT-Panel-NEW/release/yt-panel-new-linux-amd64 release-out/
          cp ../../artifacts/YT-Panel-NEW/release/yt-panel-new-linux-amd64.tar.gz release-out/

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: yt-panel-new-release
          path: release-out
          if-no-files-found: error
