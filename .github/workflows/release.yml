name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.85.1'
  RUST_TARGET: 'x86_64-unknown-linux-musl'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build-only

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.RUST_TARGET }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build Rust backend
        working-directory: backend
        run: cargo build --release --target ${{ env.RUST_TARGET }}

      - name: Build Docker image
        run: docker build -t yt-panel-release:${{ github.ref_name }} .

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Export PVE CT template
        run: ./scripts/export-pve-template.sh yt-panel-release:${{ github.ref_name }} yt-panel-alpine-ct-template.tar.zst

      - name: Prepare release files
        run: |
          mkdir -p release-out/yt-panel-linux-amd64/conf release-out/yt-panel-linux-amd64/web
          cp backend/target/${{ env.RUST_TARGET }}/release/yt-panel-rust-backend release-out/yt-panel-linux-amd64/yt-panel
          cp LICENSE release-out/yt-panel-linux-amd64/LICENSE
          cp -r dist/. release-out/yt-panel-linux-amd64/web/
          cp backend/config/docker.toml release-out/yt-panel-linux-amd64/conf/app.toml
          tar -czf yt-panel-linux-amd64.tar.gz -C release-out yt-panel-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yt-panel-linux-amd64.tar.gz
            yt-panel-alpine-ct-template.tar.zst
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            - Alpine Docker image
            - Linux AMD64 release package
            - PVE-ready Alpine CT template
            - License unified to PolyForm-Noncommercial-1.0.0

            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/yt-panel-new:latest
            ```

            ## License
            These release assets are distributed under PolyForm-Noncommercial-1.0.0 and are not licensed for commercial use.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
