name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '22.22.1'
  RUST_VERSION: '1.85.1'
  RUST_TARGET: 'x86_64-unknown-linux-musl'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build-only

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.RUST_TARGET }}

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build Rust backend
        working-directory: backend
        run: cargo build --release --target ${{ env.RUST_TARGET }}

      - name: Build CT export image
        run: docker build --target ct-template -t yt-panel-release:${{ github.ref_name }}-ct .

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Export PVE CT template
        run: ./scripts/export-pve-template.sh yt-panel-release:${{ github.ref_name }}-ct yt-panel-alpine-ct-template.tar.zst

      - name: Prepare release files
        run: ./scripts/prepare-release-files.sh release-out backend/target/${{ env.RUST_TARGET }}/release/yt-panel-rust-backend dist backend/config/docker.toml

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Changes
          - Alpine Docker image
          - Linux AMD64 release package
          - PVE-ready Alpine CT template
          - License unified to PolyForm-Noncommercial-1.0.0

          ## Docker
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/yt-panel-new:latest
          ```

          ## License
          These release assets are distributed under PolyForm-Noncommercial-1.0.0 and are not licensed for commercial use.
          EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="Release ${tag}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file release-notes.md --latest
          else
            gh release create "$tag" \
              release-out/yt-panel-linux-amd64.tar.gz \
              yt-panel-alpine-ct-template.tar.zst \
              --title "$title" \
              --notes-file release-notes.md \
              --latest
          fi

          gh release upload "$tag" \
            release-out/yt-panel-linux-amd64.tar.gz \
            yt-panel-alpine-ct-template.tar.zst \
            --clobber
