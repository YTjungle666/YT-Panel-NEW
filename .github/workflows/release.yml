name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/yt-panel

jobs:
  # Docker镜像构建
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # LXC/CT 模板构建 - 创建Proxmox VE可用的容器模板
  lxc-template:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build LXC compatible image and export rootfs
        run: |
          # 首先构建完整镜像
          docker build -t yt-panel:lxc-build .
          
          # 创建临时容器并导出rootfs
          mkdir -p /tmp/lxc-rootfs
          docker create --name lxc-temp yt-panel:lxc-build
          
          # 导出容器文件系统为tarball
          docker export lxc-temp -o /tmp/yt-panel-lxc-rootfs.tar
          
          # 清理
          docker rm lxc-temp
          
          # 压缩
          gzip /tmp/yt-panel-lxc-rootfs.tar
          
          # 移动最终文件
          mv /tmp/yt-panel-lxc-rootfs.tar.gz ./yt-panel-lxc-rootfs.tar.gz
          
          echo "LXC rootfs tarball created: yt-panel-lxc-rootfs.tar.gz"
          ls -lh ./yt-panel-lxc-rootfs.tar.gz

      - name: Create LXC setup script
        run: |
          cat > ./install-lxc.sh << 'INSTALLSCRIPT'
          #!/bin/bash
          # YT-Panel LXC/CT 安装脚本
          # 用于在Proxmox VE或标准LXC容器中安装
          
          set -e
          
          echo "=========================================="
          echo "  YT-Panel LXC/CT 安装程序"
          echo "=========================================="
          
          # 检查是否为root用户
          if [ "$EUID" -ne 0 ]; then
            echo "请使用root用户运行此脚本"
            exit 1
          fi
          
          # 创建应用目录
          INSTALL_DIR="${1:-/opt/yt-panel}"
          mkdir -p "$INSTALL_DIR"
          
          echo "安装目录: $INSTALL_DIR"
          
          # 提取rootfs
          if [ -f "yt-panel-lxc-rootfs.tar.gz" ]; then
            echo "正在解压YT-Panel..."
            tar -xzf yt-panel-lxc-rootfs.tar.gz -C "$INSTALL_DIR" --strip-components=1
          else
            echo "错误: 未找到 yt-panel-lxc-rootfs.tar.gz"
            echo "请确保tarball与脚本在同一目录"
            exit 1
          fi
          
          # 创建systemd服务
          cat > /etc/systemd/system/yt-panel.service << 'SERVICEFILE'
          [Unit]
          Description=YT-Panel Dashboard
          After=network.target
          
          [Service]
          Type=simple
          WorkingDirectory=/opt/yt-panel
          Environment=YT_PANEL_CONFIG=/opt/yt-panel/conf/app.toml
          Environment=RUST_LOG=info
          ExecStart=/opt/yt-panel/yt-panel
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
          SERVICEFILE
          
          # 创建默认配置文件
          mkdir -p "$INSTALL_DIR/conf"
          if [ ! -f "$INSTALL_DIR/conf/app.toml" ]; then
            cat > "$INSTALL_DIR/conf/app.toml" << 'CONFIGFILE'
          [server]
          host = "0.0.0.0"
          port = 3002
          
          [database]
          url = "sqlite:./database/app.db"
          
          [upload]
          max_size = 10485760
          allowed_types = ["image/jpeg", "image/png", "image/gif", "image/webp", "image/svg+xml"]
          CONFIGFILE
          fi
          
          # 创建必要目录
          mkdir -p "$INSTALL_DIR/database" "$INSTALL_DIR/uploads"
          
          # 设置权限
          chmod +x "$INSTALL_DIR/yt-panel"
          
          # 启用并启动服务
          systemctl daemon-reload
          systemctl enable yt-panel.service
          systemctl start yt-panel.service
          
          echo ""
          echo "=========================================="
          echo "  YT-Panel 安装完成!"
          echo "=========================================="
          echo "访问地址: http://$(hostname -I | awk '{print $1}'):3002"
          echo ""
          echo "管理命令:"
          echo "  systemctl status yt-panel    # 查看状态"
          echo "  systemctl stop yt-panel      # 停止服务"
          echo "  systemctl restart yt-panel   # 重启服务"
          echo "=========================================="
          INSTALLSCRIPT
          
          chmod +x ./install-lxc.sh

      - name: Upload LXC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yt-panel-lxc-artifacts
          path: |
            yt-panel-lxc-rootfs.tar.gz
            install-lxc.sh

      - name: Create Release with LXC assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yt-panel-lxc-rootfs.tar.gz
            install-lxc.sh
          generate_release_notes: true
