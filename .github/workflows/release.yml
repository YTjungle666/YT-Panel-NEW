name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build-only

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build Rust backend
        working-directory: backend
        run: cargo build --release

      - name: Prepare release files
        run: |
          mkdir -p release-out
          cp -r dist release-out/web
          cp backend/target/release/yt-panel-rust-backend release-out/yt-panel
          cp backend/config/docker.toml release-out/app.toml
          tar -czf yt-panel-linux-amd64.tar.gz -C release-out .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: yt-panel-linux-amd64.tar.gz
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            - CI fixes for npm install
            - Build artifacts for Linux AMD64
            
            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
