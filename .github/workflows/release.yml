name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  # 任务1: 构建并推送Docker镜像
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yt-panel
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 任务2: 创建LXC/CT模板
  lxc-template:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Create LXC rootfs tarball
        run: |
          # 创建临时目录
          mkdir -p /tmp/lxc-rootfs
          
          # 复制项目文件
          cp -r . /tmp/lxc-rootfs/opt/yt-panel/
          
          # 创建启动脚本
          cat > /tmp/lxc-rootfs/etc/systemd/system/yt-panel.service << 'SYSTEMD'
          [Unit]
          Description=YT-Panel Server Dashboard
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/yt-panel/backend
          ExecStart=/usr/local/bin/yt-panel
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SYSTEMD
          
          # 创建启动脚本
          mkdir -p /tmp/lxc-rootfs/usr/local/bin
          cat > /tmp/lxc-rootfs/usr/local/bin/yt-panel << 'START'
          #!/bin/bash
          cd /opt/yt-panel/backend
          ./yt-panel-rust-backend
          START
          chmod +x /tmp/lxc-rootfs/usr/local/bin/yt-panel
          
          # 创建安装脚本
          cat > /tmp/lxc-rootfs/opt/yt-panel/install.sh << 'INSTALL'
          #!/bin/bash
          set -e
          
          echo "=== YT-Panel 安装脚本 ==="
          
          # 安装依赖
          apt-get update
          apt-get install -y curl build-essential pkg-config libssl-dev
          
          # 安装Node.js 20
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          
          # 安装Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          
          # 构建后端
          cd /opt/yt-panel/backend
          cargo build --release
          cp target/release/yt-panel-rust-backend .
          
          # 构建前端
          cd /opt/yt-panel
          npm install
          npm run build
          
          # 创建数据目录
          mkdir -p /opt/yt-panel/data
          
          # 设置systemd服务
          systemctl enable yt-panel.service
          systemctl start yt-panel.service
          
          echo "安装完成！"
          echo "访问: http://$(hostname -I | awk '{print $1}'):3000"
          INSTALL
          chmod +x /tmp/lxc-rootfs/opt/yt-panel/install.sh
          
          # 打包rootfs
          cd /tmp/lxc-rootfs
          tar czf /tmp/yt-panel-lxc-template.tar.gz .

      - name: Upload LXC template to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: /tmp/yt-panel-lxc-template.tar.gz
          name: YT-Panel LXC Template ${{ github.ref_name }}
          body: |
            ## LXC/CT 模板
            
            适用于 Proxmox VE LXC 容器的根文件系统模板。
            
            ### 使用方法
            
            1. 下载模板到PVE宿主机
            2. 解压到LXC容器目录
            3. 运行安装脚本
            
            ```bash
            pct create 100 /path/to/template.tar.gz --ostype debian
            pct exec 100 -- /opt/yt-panel/install.sh
            ```

  # 任务3: 创建Release
  release:
    runs-on: ubuntu-latest
    needs: [docker, lxc-template]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~10)..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Docker镜像
            
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/yt-panel:${{ github.ref_name }}
            ```
            
            ## 更新日志
            ${{ steps.changelog.outputs.changelog }}
            
            ## 安全改进
            - SQL注入防护
            - 敏感信息过滤
            - 动态密钥加密
            - SSRF防护
            - 路径遍历防护
