name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build-only

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build Rust backend
        working-directory: backend
        run: cargo build --release

      - name: Prepare release files
        run: |
          mkdir -p release-out
          cp -r dist release-out/web
          cp backend/target/release/yt-panel-rust-backend release-out/yt-panel
          cp backend/config/docker.toml release-out/app.toml
          tar -czf release-out/yt-panel-linux-amd64.tar.gz -C release-out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-panel-release
          path: release-out/
